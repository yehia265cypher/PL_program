<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Strength — 4-Week Block</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #1a1a1a; /* gunmetal */
    --border: #333333;
    --accent: #d4af37; /* gold hint */
    --accent2: #bfa12c;
    --text: #f0f0f0;
    --muted: #777777;
    --squat: #d4af37;
    --bench: #d4af37;
    --dead: #d4af37;
    --rest: #222222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 48px 32px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .header-meta { text-align: right; }

  .header-meta p {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .header-meta strong {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 24px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 16px 24px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN LAYOUT */
  main { padding: 32px; }

  /* WEEK GRID */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 40px;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 100px;
  }

  .day-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .day-card.squat::before { background: var(--squat); }
  .day-card.bench::before { background: var(--bench); }
  .day-card.dead::before  { background: var(--dead); }
  .day-card.rest::before  { background: var(--rest); }

  .day-card:hover:not(.rest) {
    border-color: #444;
    transform: translateY(-2px);
  }

  .day-card.active-day {
    border-color: var(--accent);
    background: #111111;
  }

  .day-num {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .day-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .day-card.squat .day-label { color: var(--squat); }
  .day-card.bench .day-label { color: var(--bench); }
  .day-card.dead  .day-label { color: var(--dead); }
  .day-card.rest  .day-label { color: var(--muted); }

  .session-num {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* DETAIL PANEL */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--accent);
  }

  .panel-tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg);
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .sets-container {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .block-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .block-label:first-child { margin-top: 0; }

  .set-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }

  .set-row:hover { border-color: #444; }

  .set-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--muted);
    width: 28px;
    flex-shrink: 0;
  }

  .rep-range {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .rep-range span { color: var(--muted); font-weight: 300; font-size: 13px; }

  .rpe-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 4px;
    min-width: 68px;
    text-align: center;
    color: #000;
  }

  .rpe-6  { background: #555555; border: 1px solid #777777; }
  .rpe-7  { background: #666666; border: 1px solid #888888; }
  .rpe-75 { background: #777777; border: 1px solid #999999; }
  .rpe-8  { background: #888888; border: 1px solid #aaaaaa; }
  .rpe-9  { background: #999999; border: 1px solid #bbbbbb; }
  .rpe-10 { background: #aaaaaa; border: 1px solid #cccccc; }

  .checkbox {
    width: 18px; height: 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    background: transparent;
  }

  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox.checked::after {
    content: '✓';
    font-size: 11px;
    color: #000;
    font-weight: 700;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 28px 16px 20px; }
    .tabs { padding: 0 16px; }
    main { padding: 16px; }
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .panel-header { padding: 20px 16px; }
    .sets-container { padding: 16px; }
    .legend { padding: 16px; }
  }

  @media (max-width: 500px) {
    .week-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .hidden { display: none !important; }
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<header>
  <h1>PROJECT<br><span>STRENGTH</span></h1>
  <div class="header-meta">
    <p>Training Block</p>
    <strong>4 Weeks</strong>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:var(--squat)"></div> Squat</div>
  <div class="legend-item"><div class="dot" style="background:var(--bench)"></div> Bench</div>
  <div class="legend-item"><div class="dot" style="background:var(--dead)"></div> Deadlift</div>
  <div class="legend-item"><div class="dot" style="background:var(--rest)"></div> Rest</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('schedule')">Schedule</button>
  <button class="tab" onclick="switchTab('sessions')">All Sessions</button>
</div>

<main>
  <div id="view-schedule" class="view active">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="prevWeek()">← Prev</button>
      <div class="week-title" id="week-title">Week 1</div>
      <button class="week-nav-btn" onclick="nextWeek()">Next →</button>
    </div>

    <div class="week-grid" id="week-grid"></div>
    <div id="detail-panel"></div>
  </div>

  <div id="view-sessions" class="view">
    <div id="sessions-content"></div>
    <div id="session-detail-panel" style="margin-top:24px;"></div>
  </div>
</main>

<script>
  // JavaScript remains unchanged; handles schedule, sessions, toggling sets, week navigation
  // Copy your original JS here (from your GitHub file)
</script>

</body>
</html>
