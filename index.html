<!DOCTYPE html>

<html lang="en" style="background:#080808;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Strength — 4-Week Block</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080808;
    --surface:  #0f0f0f;
    --surface2: #141414;
    --border:   #1c1c1c;
    --border2:  #252525;
    --gold:     #c9a84c;
    --gold-dim: #7a6130;
    --text:     #e8e8e8;
    --muted:    #4a4a4a;
    --squat:    #c9a84c;
    --bench:    #8fa8c8;
    --dead:     #c87050;
    --rest:     #222;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
background-color: #080808 !important;
color: #e8e8e8;
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* ── HEADER ── */
header {
padding: 40px 32px 28px;
border-bottom: 1px solid #1c1c1c;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 16px;
position: relative;
background-color: #080808;
}

header::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, #7a6130, transparent);
}

.header-left { display: flex; align-items: center; gap: 20px; }

.logo-mark {
width: 52px; height: 52px;
border: 1px solid #7a6130;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
background-color: #111111;
}

.logo-mark span {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 1px;
color: #c9a84c;
}

header h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(36px, 5vw, 64px);
letter-spacing: 4px;
line-height: 1;
color: #e8e8e8;
}

header h1 span { color: #c9a84c; }

.header-right { text-align: right; }

.header-right p {
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: #4a4a4a;
margin-bottom: 4px;
}

.header-right strong {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 3px;
color: #c9a84c;
}

.tagline {
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: #7a6130;
margin-top: 2px;
}

/* ── LEGEND ── */
.legend {
display: flex;
gap: 28px;
padding: 16px 32px;
border-bottom: 1px solid #1c1c1c;
flex-wrap: wrap;
background-color: #080808;
}

.legend-item {
display: flex;
align-items: center;
gap: 8px;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: #4a4a4a;
}

.dot { width: 8px; height: 8px; border-radius: 1px; }

/* ── TABS ── */
.tabs {
display: flex;
padding: 0 32px;
border-bottom: 1px solid #1c1c1c;
overflow-x: auto;
background-color: #080808;
}

.tab {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px;
letter-spacing: 3px;
padding: 14px 24px;
cursor: pointer;
color: #4a4a4a;
border-bottom: 2px solid transparent;
transition: all 0.2s;
white-space: nowrap;
background: none;
border-top: none; border-left: none; border-right: none;
}

.tab:hover { color: #e8e8e8; }
.tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }

/* ── MAIN ── */
main {
padding: 28px 32px;
background-color: #080808;
min-height: 100vh;
}

/* ── WEEK NAV ── */
.week-nav {
display: flex;
align-items: center;
gap: 16px;
margin-bottom: 20px;
}

.week-nav-btn {
background-color: #141414;
border: 1px solid #252525;
color: #4a4a4a;
padding: 8px 18px;
border-radius: 4px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
letter-spacing: 1px;
transition: all 0.15s;
}

.week-nav-btn:hover {
border-color: #7a6130;
color: #c9a84c;
}

.week-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 26px;
letter-spacing: 4px;
color: #e8e8e8;
}

/* ── WEEK GRID ── */
.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 6px;
margin-bottom: 32px;
}

.day-card {
background-color: #0f0f0f;
border: 1px solid #1c1c1c;
border-radius: 6px;
padding: 14px 10px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
min-height: 96px;
}

.day-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.day-card.squat::before { background-color: #c9a84c; }
.day-card.bench::before { background-color: #8fa8c8; }
.day-card.dead::before  { background-color: #c87050; }
.day-card.rest::before  { background-color: #222; }

.day-card:hover:not(.rest) {
border-color: #252525;
background-color: #141414;
transform: translateY(-1px);
}

.day-card.active-day {
border-color: #7a6130;
background-color: #121008;
}

.day-num {
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: #4a4a4a;
margin-bottom: 8px;
}

.day-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 1px;
line-height: 1;
}

.day-card.squat .day-label { color: #c9a84c; }
.day-card.bench .day-label { color: #8fa8c8; }
.day-card.dead  .day-label { color: #c87050; }
.day-card.rest  .day-label { color: #2a2a2a; }

.session-num {
font-size: 10px;
color: #4a4a4a;
margin-top: 4px;
}

/* ── DETAIL PANEL ── */
.detail-panel {
background-color: #0f0f0f;
border: 1px solid #252525;
border-radius: 10px;
overflow: hidden;
animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(6px); }
to   { opacity: 1; transform: translateY(0); }
}

.panel-header {
padding: 24px 28px;
border-bottom: 1px solid #1c1c1c;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
position: relative;
background-color: #0f0f0f;
}

.panel-header::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, #7a6130, transparent);
opacity: 0.5;
}

.panel-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 44px;
letter-spacing: 3px;
line-height: 1;
}

.panel-title.squat { color: #c9a84c; }
.panel-title.bench { color: #8fa8c8; }
.panel-title.dead  { color: #c87050; }

.panel-tag {
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: #4a4a4a;
background-color: #080808;
padding: 5px 12px;
border-radius: 3px;
border: 1px solid #1c1c1c;
}

/* ── SETS ── */
.sets-container {
padding: 24px 28px;
display: flex;
flex-direction: column;
gap: 10px;
background-color: #0f0f0f;
}

.block-label {
font-size: 9px;
letter-spacing: 3px;
text-transform: uppercase;
color: #7a6130;
margin-bottom: 2px;
margin-top: 10px;
padding-left: 2px;
}

.block-label:first-child { margin-top: 0; }

.set-row {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 16px;
background-color: #080808;
border-radius: 6px;
border: 1px solid #1c1c1c;
transition: border-color 0.15s;
}

.set-row:hover { border-color: #252525; }

.set-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 12px;
letter-spacing: 1px;
color: #4a4a4a;
width: 24px;
flex-shrink: 0;
}

.rep-range {
font-size: 14px;
font-weight: 500;
color: #e8e8e8;
flex: 1;
}

.rep-range span {
color: #4a4a4a;
font-weight: 300;
font-size: 12px;
}

.rpe-badge {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 14px;
letter-spacing: 1px;
padding: 3px 10px;
border-radius: 3px;
min-width: 64px;
text-align: center;
}

.rpe-6  { background-color: #0d1a00; color: #7a9a30; border: 1px solid #1a3000; }
.rpe-7  { background-color: #0a1520; color: #5a8ab0; border: 1px solid #102030; }
.rpe-75 { background-color: #0a1520; color: #7aaad0; border: 1px solid #102030; }
.rpe-8  { background-color: #1a1000; color: #c9a84c; border: 1px solid #2a1a00; }
.rpe-9  { background-color: #1a0800; color: #d08050; border: 1px solid #2a1000; }
.rpe-10 { background-color: #1a0000; color: #cc3030; border: 1px solid #300000; }

.checkbox {
width: 16px; height: 16px;
border: 1px solid #252525;
border-radius: 3px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: all 0.15s;
background-color: transparent;
}

.checkbox.checked { background-color: #c9a84c; border-color: #c9a84c; }
.checkbox.checked::after { content: ‘✓’; font-size: 10px; color: #000; font-weight: 700; }

/* ── SESSIONS VIEW ── */
.sessions-grid { display: none; }
.sessions-grid.visible {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap: 12px;
}

.session-card {
background-color: #0f0f0f;
border: 1px solid #1c1c1c;
border-radius: 8px;
padding: 18px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.session-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.session-card.squat::before { background-color: #c9a84c; }
.session-card.bench::before { background-color: #8fa8c8; }
.session-card.dead::before  { background-color: #c87050; }

.session-card:hover {
border-color: #252525;
background-color: #141414;
transform: translateY(-1px);
}

.session-card-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 2px;
}

.session-card.squat .session-card-title { color: #c9a84c; }
.session-card.bench .session-card-title { color: #8fa8c8; }
.session-card.dead  .session-card-title { color: #c87050; }

.session-card-preview {
margin-top: 10px;
display: flex;
flex-direction: column;
gap: 5px;
}

.preview-row {
display: flex;
justify-content: space-between;
font-size: 11px;
color: #4a4a4a;
}

.section-heading {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 11px;
letter-spacing: 4px;
color: #4a4a4a;
margin-bottom: 10px;
}

.view { display: none; }
.view.active { display: block; }

@media (max-width: 768px) {
header { padding: 24px 16px 20px; }
.tabs { padding: 0 16px; }
.legend { padding: 12px 16px; }
main { padding: 16px; }
.week-grid { grid-template-columns: repeat(4, 1fr); }
.panel-header, .sets-container { padding: 16px; }
}

@media (max-width: 480px) {
.week-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark"><span>PS</span></div>
    <div>
      <h1>PROJECT <span>STRENGTH</span></h1>
      <div class="tagline">Engineered · Power · Excellence</div>
    </div>
  </div>
  <div class="header-right">
    <p>Training Block</p>
    <strong>4 Weeks</strong>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background-color:#c9a84c;"></div> Squat</div>
  <div class="legend-item"><div class="dot" style="background-color:#8fa8c8;"></div> Bench</div>
  <div class="legend-item"><div class="dot" style="background-color:#c87050;"></div> Deadlift</div>
  <div class="legend-item"><div class="dot" style="background-color:#333;"></div> Rest</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('schedule', event)">Schedule</button>
  <button class="tab" onclick="switchTab('sessions', event)">All Sessions</button>
</div>

<main>
  <div id="view-schedule" class="view active">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="prevWeek()">← Prev</button>
      <div class="week-title" id="week-title">Week 1</div>
      <button class="week-nav-btn" onclick="nextWeek()">Next →</button>
    </div>
    <div class="week-grid" id="week-grid"></div>
    <div id="detail-panel"></div>
  </div>

  <div id="view-sessions" class="view">
    <div id="sessions-content"></div>
    <div id="session-detail-panel" style="margin-top:20px;"></div>
  </div>
</main>

<script>
const BLOCK_LABELS = ['Hypertrophy Block', 'Building Block', 'Heavy Block'];

const squatData = [
  {name:'Squat 1',  blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'6'},{reps:'1-3',rpe:'6'}]},
  {name:'Squat 2',  blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'7.5'},{reps:'1-3',rpe:'6'}]},
  {name:'Squat 3',  blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'7.5'},{reps:'1-3',rpe:'7.5'}]},
  {name:'Squat 4',  blocks:[{reps:'4-7',rpe:'7.5'},{reps:'2-5',rpe:'7.5'},{reps:'1-3',rpe:'7.5'}]},
  {name:'Squat 5',  blocks:[{reps:'4-7',rpe:'7.5'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'7.5'}]},
  {name:'Squat 6',  blocks:[{reps:'4-7',rpe:'9'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'9'}]},
];

const benchData = [
  {name:'Bench 1',  blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'6'},{reps:'1-3',rpe:'6'}]},
  {name:'Bench 2',  blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'7'},{reps:'1-3',rpe:'6'}]},
  {name:'Bench 3',  blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'7'},{reps:'1-3',rpe:'7'}]},
  {name:'Bench 4',  blocks:[{reps:'4-7',rpe:'7'},{reps:'2-5',rpe:'7'},{reps:'1-3',rpe:'7'}]},
  {name:'Bench 5',  blocks:[{reps:'4-7',rpe:'7'},{reps:'2-5',rpe:'8'},{reps:'1-3',rpe:'7'}]},
  {name:'Bench 6',  blocks:[{reps:'4-7',rpe:'7'},{reps:'2-5',rpe:'8'},{reps:'1-3',rpe:'8'}]},
  {name:'Bench 7',  blocks:[{reps:'4-7',rpe:'8'},{reps:'2-5',rpe:'8'},{reps:'1-3',rpe:'8'}]},
  {name:'Bench 8',  blocks:[{reps:'4-7',rpe:'8'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'8'}]},
  {name:'Bench 9',  blocks:[{reps:'4-7',rpe:'8'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'9'}]},
  {name:'Bench 10', blocks:[{reps:'4-7',rpe:'9'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'9'}]},
  {name:'Bench 11', blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'6'},{reps:'1-3',rpe:'6'}]},
  {name:'Bench 12', blocks:[{reps:'4-7',rpe:'10'},{reps:'2-5',rpe:'10'},{reps:'1-3',rpe:'10'}]},
];

const deadData = [
  {name:'Deadlift 1', blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'6'},{reps:'1-3',rpe:'6'}]},
  {name:'Deadlift 2', blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'7.5'},{reps:'1-3',rpe:'6'}]},
  {name:'Deadlift 3', blocks:[{reps:'4-7',rpe:'6'},{reps:'2-5',rpe:'7.5'},{reps:'1-3',rpe:'7.5'}]},
  {name:'Deadlift 4', blocks:[{reps:'4-7',rpe:'7.5'},{reps:'2-5',rpe:'7.5'},{reps:'1-3',rpe:'7.5'}]},
  {name:'Deadlift 5', blocks:[{reps:'4-7',rpe:'7.5'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'7.5'}]},
  {name:'Deadlift 6', blocks:[{reps:'4-7',rpe:'9'},{reps:'2-5',rpe:'9'},{reps:'1-3',rpe:'9'}]},
];

const schedule = [
  {type:'squat',idx:0},{type:'bench',idx:0},{type:'dead',idx:0},
  {type:'bench',idx:1},{type:'rest'},{type:'squat',idx:1},{type:'bench',idx:2},
  {type:'dead',idx:1},{type:'bench',idx:3},{type:'rest'},
  {type:'squat',idx:2},{type:'bench',idx:4},{type:'dead',idx:2},{type:'bench',idx:5},
  {type:'squat',idx:3},{type:'bench',idx:6},{type:'dead',idx:3},
  {type:'bench',idx:7},{type:'rest'},{type:'squat',idx:4},{type:'bench',idx:8},
  {type:'dead',idx:4},{type:'bench',idx:9},{type:'rest'},
  {type:'squat',idx:5},{type:'bench',idx:10},{type:'dead',idx:5},{type:'bench',idx:11},
];

let currentWeek = 0, selectedDay = null, checkedSets = {};

function getSession(e) {
  if (e.type==='rest') return null;
  return e.type==='squat' ? squatData[e.idx] : e.type==='bench' ? benchData[e.idx] : deadData[e.idx];
}

function rpeClass(r) {
  return {'6':'rpe-6','7':'rpe-7','7.5':'rpe-75','8':'rpe-8','9':'rpe-9','10':'rpe-10'}[r]||'rpe-6';
}

function renderWeek() {
  const grid = document.getElementById('week-grid');
  document.getElementById('week-title').textContent = 'Week ' + (currentWeek+1);
  grid.innerHTML = '';
  const start = currentWeek * 7;
  schedule.slice(start, start+7).forEach(function(entry, i) {
    const gIdx = start + i;
    const session = getSession(entry);
    const card = document.createElement('div');
    card.className = 'day-card ' + (entry.type==='rest' ? 'rest' : entry.type);
    if (selectedDay===gIdx) card.classList.add('active-day');
    const short = entry.type==='squat'?'SQ':entry.type==='bench'?'BP':entry.type==='dead'?'DL':'—';
    card.innerHTML =
      '<div class="day-num">Day ' + (start+i+1) + '</div>' +
      '<div class="day-label">' + (entry.type==='rest'?'Rest':short) + '</div>' +
      '<div class="session-num">' + (session?session.name:'') + '</div>';
    if (entry.type!=='rest') {
      card.onclick = (function(e, idx) {
        return function() { selectedDay=idx; renderWeek(); renderDetail(e); };
      })(entry, gIdx);
    }
    grid.appendChild(card);
  });
  if (selectedDay===null || Math.floor(selectedDay/7)!==currentWeek) {
    document.getElementById('detail-panel').innerHTML = '';
    selectedDay = null;
  }
}

function buildSetsHTML(session, prefix) {
  let html = '', n = 1;
  session.blocks.forEach(function(block, bi) {
    html += '<div class="block-label">' + BLOCK_LABELS[bi] + ' — ' + block.reps + ' reps</div>';
    for (let s=0; s<2; s++) {
      const key = prefix + '_' + session.name + '_' + bi + '_' + s;
      const chk = checkedSets[key] ? 'checked' : '';
      html +=
        '<div class="set-row">' +
          '<div class="set-num">S' + n++ + '</div>' +
          '<div class="rep-range">' + block.reps + ' <span>reps</span></div>' +
          '<div class="rpe-badge ' + rpeClass(block.rpe) + '">RPE ' + block.rpe + '</div>' +
          '<div class="checkbox ' + chk + '" onclick="toggleSet(\'' + key + '\',this)"></div>' +
        '</div>';
    }
  });
  return html;
}

function renderDetail(entry) {
  const session = getSession(entry);
  if (!session) return;
  const tc = entry.type==='dead'?'dead':entry.type;
  document.getElementById('detail-panel').innerHTML =
    '<div class="detail-panel">' +
      '<div class="panel-header">' +
        '<div class="panel-title ' + tc + '">' + session.name + '</div>' +
        '<div class="panel-tag">6 sets · 3 blocks</div>' +
      '</div>' +
      '<div class="sets-container">' + buildSetsHTML(session,'sch') + '</div>' +
    '</div>';
}

function toggleSet(key, el) {
  checkedSets[key] = !checkedSets[key];
  el.classList.toggle('checked', checkedSets[key]);
}

function prevWeek() { if(currentWeek>0){currentWeek--;selectedDay=null;renderWeek();} }
function nextWeek() { if(currentWeek<3){currentWeek++;selectedDay=null;renderWeek();} }

function renderSessionsView() {
  const groups = [
    {label:'Squat',data:squatData,type:'squat'},
    {label:'Bench',data:benchData,type:'bench'},
    {label:'Deadlift',data:deadData,type:'dead'},
  ];
  let html = '';
  groups.forEach(function(g) {
    html += '<div style="margin-bottom:28px;"><div class="section-heading">' + g.label + '</div><div class="sessions-grid visible">';
    g.data.forEach(function(s, idx) {
      html +=
        '<div class="session-card ' + g.type + '" onclick="showSessionDetail(\'' + g.type + '\',' + idx + ')">' +
          '<div class="session-card-title">' + s.name + '</div>' +
          '<div class="session-card-preview">';
      s.blocks.forEach(function(b, bi) {
        html += '<div class="preview-row"><span>' + BLOCK_LABELS[bi] + '</span><span>2x' + b.reps + ' @ RPE ' + b.rpe + '</span></div>';
      });
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('sessions-content').innerHTML = html;
}

function showSessionDetail(type, idx) {
  const session = type==='squat'?squatData[idx]:type==='bench'?benchData[idx]:deadData[idx];
  const tc = type==='dead'?'dead':type;
  const panel = document.getElementById('session-detail-panel');
  panel.innerHTML =
    '<div class="detail-panel">' +
      '<div class="panel-header">' +
        '<div class="panel-title ' + tc + '">' + session.name + '</div>' +
        '<div class="panel-tag">6 sets · 3 blocks</div>' +
      '</div>' +
      '<div class="sets-container">' + buildSetsHTML(session,'det') + '</div>' +
    '</div>';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchTab(tab, e) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  e.target.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  if (tab==='sessions') renderSessionsView();
}

renderWeek();
</script>
