<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Strength — 4-Week Block</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080808;
    --surface:  #0f0f0f;
    --surface2: #141414;
    --border:   #1c1c1c;
    --border2:  #252525;
    --gold:     #c9a84c;
    --gold-dim: #7a6130;
    --gold-glow:#c9a84c33;
    --gun:      #3a3f47;
    --gun-dim:  #252930;
    --text:     #e8e8e8;
    --muted:    #4a4a4a;
    --squat:    #c9a84c;
    --bench:    #8fa8c8;
    --dead:     #c87050;
    --rest:     #222;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* ── HEADER ── */
header {
padding: 40px 32px 28px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 16px;
position: relative;
overflow: hidden;
}

header::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold-dim), transparent);
}

.header-left { display: flex; align-items: center; gap: 20px; }

.logo-mark {
width: 52px; height: 52px;
border: 1px solid var(–gold-dim);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
}

.logo-mark span {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 1px;
color: var(–gold);
}

header h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(36px, 5vw, 64px);
letter-spacing: 4px;
line-height: 1;
color: var(–text);
}

header h1 span { color: var(–gold); }

.header-right { text-align: right; }

.header-right p {
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 4px;
}

.header-right strong {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 3px;
color: var(–gold);
}

.tagline {
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–gold-dim);
margin-top: 2px;
}

/* ── LEGEND ── */
.legend {
display: flex;
gap: 28px;
padding: 16px 32px;
border-bottom: 1px solid var(–border);
flex-wrap: wrap;
}

.legend-item {
display: flex;
align-items: center;
gap: 8px;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
}

.dot { width: 8px; height: 8px; border-radius: 1px; }

/* ── TABS ── */
.tabs {
display: flex;
padding: 0 32px;
border-bottom: 1px solid var(–border);
overflow-x: auto;
}

.tab {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px;
letter-spacing: 3px;
padding: 14px 24px;
cursor: pointer;
color: var(–muted);
border-bottom: 2px solid transparent;
transition: all 0.2s;
white-space: nowrap;
background: none;
border-top: none; border-left: none; border-right: none;
}

.tab:hover { color: var(–text); }
.tab.active { color: var(–gold); border-bottom-color: var(–gold); }

/* ── MAIN ── */
main { padding: 28px 32px; }

/* ── WEEK NAV ── */
.week-nav {
display: flex;
align-items: center;
gap: 16px;
margin-bottom: 20px;
}

.week-nav-btn {
background: var(–surface2);
border: 1px solid var(–border2);
color: var(–muted);
padding: 8px 18px;
border-radius: 4px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
letter-spacing: 1px;
transition: all 0.15s;
}

.week-nav-btn:hover {
border-color: var(–gold-dim);
color: var(–gold);
}

.week-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 26px;
letter-spacing: 4px;
color: var(–text);
}

/* ── WEEK GRID ── */
.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 6px;
margin-bottom: 32px;
}

.day-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
padding: 14px 10px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
min-height: 96px;
}

.day-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.day-card.squat::before { background: var(–squat); }
.day-card.bench::before { background: var(–bench); }
.day-card.dead::before  { background: var(–dead); }
.day-card.rest::before  { background: var(–rest); }

.day-card:hover:not(.rest) {
border-color: var(–border2);
background: var(–surface2);
transform: translateY(-1px);
}

.day-card.active-day {
border-color: var(–gold-dim);
background: #121008;
}

.day-num {
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 8px;
}

.day-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 1px;
line-height: 1;
}

.day-card.squat .day-label { color: var(–squat); }
.day-card.bench .day-label { color: var(–bench); }
.day-card.dead  .day-label { color: var(–dead); }
.day-card.rest  .day-label { color: #2a2a2a; }

.session-num {
font-size: 10px;
color: var(–muted);
margin-top: 4px;
letter-spacing: 0.5px;
}

/* ── DETAIL PANEL ── */
.detail-panel {
background: var(–surface);
border: 1px solid var(–border2);
border-radius: 10px;
overflow: hidden;
animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(6px); }
to   { opacity: 1; transform: translateY(0); }
}

.panel-header {
padding: 24px 28px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
position: relative;
}

.panel-header::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, var(–gold-dim), transparent);
opacity: 0.5;
}

.panel-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 44px;
letter-spacing: 3px;
line-height: 1;
}

.panel-title.squat { color: var(–squat); }
.panel-title.bench { color: var(–bench); }
.panel-title.dead  { color: var(–dead); }

.panel-tag {
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–muted);
background: var(–bg);
padding: 5px 12px;
border-radius: 3px;
border: 1px solid var(–border);
}

/* ── SETS ── */
.sets-container {
padding: 24px 28px;
display: flex;
flex-direction: column;
gap: 10px;
}

.block-label {
font-size: 9px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–gold-dim);
margin-bottom: 2px;
margin-top: 10px;
padding-left: 2px;
}

.block-label:first-child { margin-top: 0; }

.set-row {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 16px;
background: var(–bg);
border-radius: 6px;
border: 1px solid var(–border);
transition: border-color 0.15s;
}

.set-row:hover { border-color: var(–border2); }

.set-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 12px;
letter-spacing: 1px;
color: var(–muted);
width: 24px;
flex-shrink: 0;
}

.rep-range {
font-size: 14px;
font-weight: 500;
color: var(–text);
flex: 1;
}

.rep-range span {
color: var(–muted);
font-weight: 300;
font-size: 12px;
}

.rpe-badge {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 14px;
letter-spacing: 1px;
padding: 3px 10px;
border-radius: 3px;
min-width: 64px;
text-align: center;
}

.rpe-6  { background: #0d1a00; color: #7a9a30; border: 1px solid #1a3000; }
.rpe-7  { background: #0a1520; color: #5a8ab0; border: 1px solid #102030; }
.rpe-75 { background: #0a1520; color: #7aaad0; border: 1px solid #102030; }
.rpe-8  { background: #1a1000; color: var(–gold); border: 1px solid #2a1a00; }
.rpe-9  { background: #1a0800; color: #d08050; border: 1px solid #2a1000; }
.rpe-10 { background: #1a0000; color: #cc3030; border: 1px solid #300000; }

.checkbox {
width: 16px; height: 16px;
border: 1px solid var(–border2);
border-radius: 3px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: all 0.15s;
background: transparent;
}

.checkbox.checked { background: var(–gold); border-color: var(–gold); }
.checkbox.checked::after { content: ‘✓’; font-size: 10px; color: #000; font-weight: 700; }

/* ── SESSIONS VIEW ── */
.sessions-grid { display: none; }
.sessions-grid.visible {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap: 12px;
}

.session-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 18px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.session-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.session-card.squat::before { background: var(–squat); }
.session-card.bench::before { background: var(–bench); }
.session-card.dead::before  { background: var(–dead); }

.session-card:hover {
border-color: var(–border2);
background: var(–surface2);
transform: translateY(-1px);
}

.session-card-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 2px;
}

.session-card.squat .session-card-title { color: var(–squat); }
.session-card.bench .session-card-title { color: var(–bench); }
.session-card.dead  .session-card-title { color: var(–dead); }

.session-card-preview {
margin-top: 10px;
display: flex;
flex-direction: column;
gap: 5px;
}

.preview-row {
display: flex;
justify-content: space-between;
font-size: 11px;
color: var(–muted);
}

.section-heading {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 11px;
letter-spacing: 4px;
color: var(–muted);
margin-bottom: 10px;
}

.view { display: none; }
.view.active { display: block; }

@media (max-width: 768px) {
header { padding: 24px 16px 20px; }
.tabs { padding: 0 16px; }
.legend { padding: 12px 16px; }
main { padding: 16px; }
.week-grid { grid-template-columns: repeat(4, 1fr); }
.panel-header, .sets-container { padding: 16px; }
}

@media (max-width: 480px) {
.week-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark"><span>PS</span></div>
    <div>
      <h1>PROJECT <span>STRENGTH</span></h1>
      <div class="tagline">Engineered · Power · Excellence</div>
    </div>
  </div>
  <div class="header-right">
    <p>Training Block</p>
    <strong>4 Weeks</strong>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:var(--squat)"></div> Squat</div>
  <div class="legend-item"><div class="dot" style="background:var(--bench)"></div> Bench</div>
  <div class="legend-item"><div class="dot" style="background:var(--dead)"></div> Deadlift</div>
  <div class="legend-item"><div class="dot" style="background:var(--rest)"></div> Rest</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('schedule', event)">Schedule</button>
  <button class="tab" onclick="switchTab('sessions', event)">All Sessions</button>
</div>

<main>
  <div id="view-schedule" class="view active">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="prevWeek()">← Prev</button>
      <div class="week-title" id="week-title">Week 1</div>
      <button class="week-nav-btn" onclick="nextWeek()">Next →</button>
    </div>
    <div class="week-grid" id="week-grid"></div>
    <div id="detail-panel"></div>
  </div>

  <div id="view-sessions" class="view">
    <div id="sessions-content"></div>
    <div id="session-detail-panel" style="margin-top:20px;"></div>
  </div>
</main>

<script>
const BLOCK_LABELS = ['Hypertrophy Block', 'Building Block', 'Heavy Block'];

const squatData = [
  {name:'Squat 1',  blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'6'},{reps:'1–3',rpe:'6'}]},
  {name:'Squat 2',  blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'7.5'},{reps:'1–3',rpe:'6'}]},
  {name:'Squat 3',  blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'7.5'},{reps:'1–3',rpe:'7.5'}]},
  {name:'Squat 4',  blocks:[{reps:'4–7',rpe:'7.5'},{reps:'2–5',rpe:'7.5'},{reps:'1–3',rpe:'7.5'}]},
  {name:'Squat 5',  blocks:[{reps:'4–7',rpe:'7.5'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'7.5'}]},
  {name:'Squat 6',  blocks:[{reps:'4–7',rpe:'9'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'9'}]},
];

const benchData = [
  {name:'Bench 1',  blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'6'},{reps:'1–3',rpe:'6'}]},
  {name:'Bench 2',  blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'7'},{reps:'1–3',rpe:'6'}]},
  {name:'Bench 3',  blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'7'},{reps:'1–3',rpe:'7'}]},
  {name:'Bench 4',  blocks:[{reps:'4–7',rpe:'7'},{reps:'2–5',rpe:'7'},{reps:'1–3',rpe:'7'}]},
  {name:'Bench 5',  blocks:[{reps:'4–7',rpe:'7'},{reps:'2–5',rpe:'8'},{reps:'1–3',rpe:'7'}]},
  {name:'Bench 6',  blocks:[{reps:'4–7',rpe:'7'},{reps:'2–5',rpe:'8'},{reps:'1–3',rpe:'8'}]},
  {name:'Bench 7',  blocks:[{reps:'4–7',rpe:'8'},{reps:'2–5',rpe:'8'},{reps:'1–3',rpe:'8'}]},
  {name:'Bench 8',  blocks:[{reps:'4–7',rpe:'8'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'8'}]},
  {name:'Bench 9',  blocks:[{reps:'4–7',rpe:'8'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'9'}]},
  {name:'Bench 10', blocks:[{reps:'4–7',rpe:'9'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'9'}]},
  {name:'Bench 11', blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'6'},{reps:'1–3',rpe:'6'}]},
  {name:'Bench 12', blocks:[{reps:'4–7',rpe:'10'},{reps:'2–5',rpe:'10'},{reps:'1–3',rpe:'10'}]},
];

const deadData = [
  {name:'Deadlift 1', blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'6'},{reps:'1–3',rpe:'6'}]},
  {name:'Deadlift 2', blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'7.5'},{reps:'1–3',rpe:'6'}]},
  {name:'Deadlift 3', blocks:[{reps:'4–7',rpe:'6'},{reps:'2–5',rpe:'7.5'},{reps:'1–3',rpe:'7.5'}]},
  {name:'Deadlift 4', blocks:[{reps:'4–7',rpe:'7.5'},{reps:'2–5',rpe:'7.5'},{reps:'1–3',rpe:'7.5'}]},
  {name:'Deadlift 5', blocks:[{reps:'4–7',rpe:'7.5'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'7.5'}]},
  {name:'Deadlift 6', blocks:[{reps:'4–7',rpe:'9'},{reps:'2–5',rpe:'9'},{reps:'1–3',rpe:'9'}]},
];

const schedule = [
  {type:'squat',idx:0},{type:'bench',idx:0},{type:'dead',idx:0},
  {type:'bench',idx:1},{type:'rest'},{type:'squat',idx:1},{type:'bench',idx:2},
  {type:'dead',idx:1},{type:'bench',idx:3},{type:'rest'},
  {type:'squat',idx:2},{type:'bench',idx:4},{type:'dead',idx:2},{type:'bench',idx:5},
  {type:'squat',idx:3},{type:'bench',idx:6},{type:'dead',idx:3},
  {type:'bench',idx:7},{type:'rest'},{type:'squat',idx:4},{type:'bench',idx:8},
  {type:'dead',idx:4},{type:'bench',idx:9},{type:'rest'},
  {type:'squat',idx:5},{type:'bench',idx:10},{type:'dead',idx:5},{type:'bench',idx:11},
];

let currentWeek = 0, selectedDay = null, checkedSets = {};

function getSession(e) {
  if (e.type==='rest') return null;
  return e.type==='squat' ? squatData[e.idx] : e.type==='bench' ? benchData[e.idx] : deadData[e.idx];
}

function rpeClass(r) {
  return {'6':'rpe-6','7':'rpe-7','7.5':'rpe-75','8':'rpe-8','9':'rpe-9','10':'rpe-10'}[r]||'rpe-6';
}

function renderWeek() {
  const grid = document.getElementById('week-grid');
  document.getElementById('week-title').textContent = `Week ${currentWeek+1}`;
  grid.innerHTML = '';
  const start = currentWeek * 7;
  schedule.slice(start, start+7).forEach((entry, i) => {
    const gIdx = start + i;
    const session = getSession(entry);
    const card = document.createElement('div');
    card.className = `day-card ${entry.type==='rest'?'rest':entry.type}`;
    if (selectedDay===gIdx) card.classList.add('active-day');
    const short = entry.type==='squat'?'SQ':entry.type==='bench'?'BP':entry.type==='dead'?'DL':'—';
    card.innerHTML = `
      <div class="day-num">Day ${start+i+1}</div>
      <div class="day-label">${entry.type==='rest'?'Rest':short}</div>
      <div class="session-num">${session?session.name:''}</div>
    `;
    if (entry.type!=='rest') card.onclick = () => { selectedDay=gIdx; renderWeek(); renderDetail(entry); };
    grid.appendChild(card);
  });
  if (selectedDay===null || Math.floor(selectedDay/7)!==currentWeek) {
    document.getElementById('detail-panel').innerHTML = '';
    selectedDay = null;
  }
}

function buildSetsHTML(session, prefix) {
  let html = '', n = 1;
  session.blocks.forEach((block, bi) => {
    html += `<div class="block-label">${BLOCK_LABELS[bi]} — ${block.reps} reps</div>`;
    for (let s=0; s<2; s++) {
      const key = `${prefix}_${session.name}_${bi}_${s}`;
      const chk = checkedSets[key]?'checked':'';
      html += `
        <div class="set-row">
          <div class="set-num">S${n++}</div>
          <div class="rep-range">${block.reps} <span>reps</span></div>
          <div class="rpe-badge ${rpeClass(block.rpe)}">RPE ${block.rpe}</div>
          <div class="checkbox ${chk}" onclick="toggleSet('${key}',this)"></div>
        </div>`;
    }
  });
  return html;
}

function renderDetail(entry) {
  const session = getSession(entry);
  if (!session) return;
  const tc = entry.type==='dead'?'dead':entry.type;
  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-panel">
      <div class="panel-header">
        <div class="panel-title ${tc}">${session.name}</div>
        <div class="panel-tag">6 sets · 3 blocks</div>
      </div>
      <div class="sets-container">${buildSetsHTML(session,'sch')}</div>
    </div>`;
}

function toggleSet(key, el) {
  checkedSets[key] = !checkedSets[key];
  el.classList.toggle('checked', checkedSets[key]);
}

function prevWeek() { if(currentWeek>0){currentWeek--;selectedDay=null;renderWeek();} }
function nextWeek() { if(currentWeek<3){currentWeek++;selectedDay=null;renderWeek();} }

function renderSessionsView() {
  const groups = [
    {label:'Squat',data:squatData,type:'squat'},
    {label:'Bench',data:benchData,type:'bench'},
    {label:'Deadlift',data:deadData,type:'dead'},
  ];
  document.getElementById('sessions-content').innerHTML = groups.map(g => `
    <div style="margin-bottom:28px;">
      <div class="section-heading">${g.label}</div>
      <div class="sessions-grid visible">
        ${g.data.map((s,idx) => `
          <div class="session-card ${g.type}" onclick="showSessionDetail('${g.type}',${idx})">
            <div class="session-card-title">${s.name}</div>
            <div class="session-card-preview">
              ${s.blocks.map((b,bi) => `
                <div class="preview-row">
                  <span>${BLOCK_LABELS[bi]}</span>
                  <span>2×${b.reps} @ RPE ${b.rpe}</span>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function showSessionDetail(type, idx) {
  const session = type==='squat'?squatData[idx]:type==='bench'?benchData[idx]:deadData[idx];
  const tc = type==='dead'?'dead':type;
  const panel = document.getElementById('session-detail-panel');
  panel.innerHTML = `
    <div class="detail-panel">
      <div class="panel-header">
        <div class="panel-title ${tc}">${session.name}</div>
        <div class="panel-tag">6 sets · 3 blocks</div>
      </div>
      <div class="sets-container">${buildSetsHTML(session,'det')}</div>
    </div>`;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchTab(tab, e) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`view-${tab}`).classList.add('active');
  if (tab==='sessions') renderSessionsView();
}

renderWeek();
</script>
